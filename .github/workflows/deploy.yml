name: Deploy Frontend to VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/opt/my_cube_split"
            BACKEND_DIR="$APP_DIR/backend_repo"
            FRONTEND_DIR="$APP_DIR/frontend_repo"
            BACKEND_REPO_URL="${{ secrets.BACKEND_REPO_URL }}"
            FRONTEND_REPO_URL="${{ secrets.FRONTEND_REPO_URL }}"

            mkdir -p "$APP_DIR"

            if [ ! -d "$BACKEND_DIR/.git" ]; then
              git clone "$BACKEND_REPO_URL" "$BACKEND_DIR"
            fi

            if [ ! -d "$FRONTEND_DIR/.git" ]; then
              git clone "$FRONTEND_REPO_URL" "$FRONTEND_DIR"
            fi

            cd "$BACKEND_DIR"
            git fetch origin
            git checkout main || git checkout master
            git pull origin "$(git rev-parse --abbrev-ref HEAD)"

            cd "$FRONTEND_DIR"
            git fetch origin
            git checkout main || git checkout master
            git pull origin "$(git rev-parse --abbrev-ref HEAD)"

            cd "$BACKEND_DIR"
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available"
              exit 1
            fi

            $COMPOSE_CMD down
            $COMPOSE_CMD up -d --build
