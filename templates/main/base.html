{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}My Cube{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main/css/styles.css' %}?v=20260419-2">
    <link rel="icon" type="image/x-icon" href="{% static 'main/favicon.ico' %}?v=20260419-1">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
        }
    }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}" data-user-authenticated="{% if request.user.is_authenticated %}1{% else %}0{% endif %}">
    <div class="page-loader" data-page-loader>
        <div class="page-loader__content">
            <span class="page-loader__grid" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </span>
        </div>
    </div>

    {% block content %}{% endblock %}
    {% csrf_token %}
    <script>
        window.getCsrfToken = () => {
            const token = document.querySelector('[name=csrfmiddlewaretoken]')?.value;
            return token || '';
        };
    </script>
    <script type="module" src="{% static 'main/js/app.js' %}?v=20260419-2"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
